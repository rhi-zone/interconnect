<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interconnect Webchat</title>
<style>
  body { font-family: monospace; max-width: 700px; margin: 2rem auto; padding: 0 1rem; background: #111; color: #eee; }
  h1 { font-size: 1.2rem; color: #9cf; }
  #status { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; }
  #messages { border: 1px solid #333; border-radius: 4px; height: 400px; overflow-y: auto; padding: 0.5rem; background: #1a1a1a; }
  .msg { margin: 0.25rem 0; }
  .msg .author { color: #9cf; }
  .msg .ts { color: #555; font-size: 0.8em; margin-left: 0.5rem; }
  #input-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  #text { flex: 1; background: #222; color: #eee; border: 1px solid #444; padding: 0.4rem; border-radius: 4px; }
  button { background: #334; color: #9cf; border: 1px solid #446; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; }
  button:hover { background: #445; }
</style>
</head>
<body>
<h1>Interconnect Webchat</h1>
<div id="status">connecting…</div>
<div id="messages"></div>
<div id="input-row">
  <input id="text" type="text" placeholder="type a message…" autocomplete="off">
  <button id="send">Send</button>
</div>
<script>
const statusEl = document.getElementById('status');
const messagesEl = document.getElementById('messages');
const textEl = document.getElementById('text');
const sendBtn = document.getElementById('send');

const name = 'Browser User';
const identity = 'local:browser-' + Math.random().toString(36).slice(2, 8);

const ws = new WebSocket('ws://' + location.host + '/ws');

ws.onopen = () => {
  statusEl.textContent = 'authenticating…';
  ws.send(JSON.stringify({ type: 'auth', identity, name }));
};

ws.onclose = () => { statusEl.textContent = 'disconnected'; };
ws.onerror = () => { statusEl.textContent = 'error'; };

ws.onmessage = (ev) => {
  const msg = JSON.parse(ev.data);
  if (msg.type === 'manifest') {
    statusEl.textContent = 'connected to ' + msg.name;
  } else if (msg.type === 'snapshot') {
    renderMessages(msg.data.messages);
  }
};

function renderMessages(msgs) {
  messagesEl.innerHTML = '';
  for (const m of msgs) {
    const div = document.createElement('div');
    div.className = 'msg';
    const d = new Date(m.timestamp);
    const ts = d.toLocaleTimeString();
    div.innerHTML = '<span class="author">' + esc(m.author) + '</span> ' +
                    esc(m.text) +
                    '<span class="ts">' + ts + '</span>';
    messagesEl.appendChild(div);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sendMessage() {
  const text = textEl.value.trim();
  if (!text || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'intent', data: { type: 'send_message', text } }));
  textEl.value = '';
}

sendBtn.onclick = sendMessage;
textEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
